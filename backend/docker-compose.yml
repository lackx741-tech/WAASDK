services:
  api:
    build: .
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    environment:
      - MONGODB_URI=mongodb://mongo:27017/waassdk

  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo_data:
